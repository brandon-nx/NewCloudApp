<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Dashboard - LifeTrack</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/style.css">

    <script type="module">
        import { auth } from "/js/firebase-config.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "/login";
            } else {
                console.log("✅ Authenticated as:", user.email);
            }
        });
    </script>

    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: { "display": ["Manrope"] },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>

    <style>
        .circular-progress {
            background: conic-gradient(var(--progress-color) calc(var(--percentage) * 1%), #e2e8f0 0);
        }
        .font-variation-fill-1 { font-variation-settings: 'FILL' 1; }
        /* Smooth transitions for the chart bars */
        .chart-bar {
            transition: height 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
    <div class="relative flex min-h-screen w-full flex-col overflow-x-hidden max-w-md mx-auto bg-white dark:bg-background-dark shadow-xl">
        
        <header class="flex-none bg-white/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 sticky top-0 z-20">
            <div class="flex items-center justify-between px-6 py-4">
                <div class="flex items-center gap-2">
                    <div class="bg-primary p-1.5 rounded-lg">
                        <span class="material-symbols-outlined text-white text-xl">insights</span>
                    </div>
                    <h1 class="text-2xl font-black tracking-tighter text-slate-900 dark:text-slate-100">LifeTrack</h1>
                </div>
                <button id="profile-btn" class="relative p-2 text-slate-600 dark:text-slate-400 active:scale-90 transition-transform">
                    <span class="material-symbols-outlined text-2xl">account_circle</span>
                </button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto px-6 pt-8 pb-[100px] space-y-8">
            <section>
                <div class="bg-primary rounded-xl p-6 shadow-lg shadow-primary/20 relative overflow-hidden">
                    <div class="relative z-10">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <p class="text-white/80 text-sm font-semibold uppercase tracking-wider">Today's Progress</p>
                                <h2 id="overall-progress-text" class="text-3xl font-bold text-white mt-1">0% Complete</h2>
                            </div>
                            <span class="material-symbols-outlined text-white/30 text-4xl">bolt</span>
                        </div>
                        <div class="w-full bg-white/20 rounded-full h-3 mb-4">
                            <div id="progress-bar-fill" class="bg-white h-3 rounded-full transition-all duration-1000" style="width: 0%;"></div>
                        </div>
                        <p id="progress-stats" class="text-white/90 text-sm font-medium">Loading your habits...</p>
                    </div>
                    <div class="absolute -right-8 -bottom-8 w-32 h-32 bg-white/10 rounded-full blur-2xl"></div>
                </div>
            </section>

            <section>
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-lg font-bold text-slate-900 dark:text-slate-100">Active Habits</h3>
                    <button class="text-primary text-sm font-semibold">View All</button>
                </div>
                <div id="habits-container" class="grid grid-cols-2 gap-4">
                    <p class="text-slate-400 text-sm italic col-span-2 text-center py-10">Synchronizing with Cloud SQL...</p>
                </div>
            </section>

            <section class="pb-6">
                <div class="bg-white dark:bg-slate-900 p-6 rounded-xl border border-slate-200 dark:border-slate-800">
                    <h3 class="font-bold text-slate-900 dark:text-slate-100 mb-6 text-sm uppercase tracking-wider">Weekly Activity</h3>
                    <div id="weekly-chart" class="flex items-end justify-between h-32 gap-2 px-2">
                        <div class="flex flex-col items-center gap-1 w-full h-full justify-end">
                            <div class="chart-bar bg-primary/20 w-full rounded-t-lg h-[10%] transition-all duration-700"></div>
                            <span class="text-[10px] font-bold text-slate-400">M</span>
                        </div>
                        <div class="flex flex-col items-center gap-1 w-full h-full justify-end">
                            <div class="chart-bar bg-primary/20 w-full rounded-t-lg h-[10%] transition-all duration-700"></div>
                            <span class="text-[10px] font-bold text-slate-400">T</span>
                        </div>
                        <div class="flex flex-col items-center gap-1 w-full h-full justify-end">
                            <div class="chart-bar bg-primary/20 w-full rounded-t-lg h-[10%] transition-all duration-700"></div>
                            <span class="text-[10px] font-bold text-slate-400">W</span>
                        </div>
                        <div class="flex flex-col items-center gap-1 w-full h-full justify-end">
                            <div class="chart-bar bg-primary/20 w-full rounded-t-lg h-[10%] transition-all duration-700"></div>
                            <span class="text-[10px] font-bold text-slate-400">T</span>
                        </div>
                        <div class="flex flex-col items-center gap-1 w-full h-full justify-end">
                            <div class="chart-bar bg-primary/20 w-full rounded-t-lg h-[10%] transition-all duration-700"></div>
                            <span class="text-[10px] font-bold text-slate-400">F</span>
                        </div>
                        <div class="flex flex-col items-center gap-1 w-full h-full justify-end">
                            <div class="chart-bar bg-primary/20 w-full rounded-t-lg h-[10%] transition-all duration-700"></div>
                            <span class="text-[10px] font-bold text-slate-400">S</span>
                        </div>
                        <div class="flex flex-col items-center gap-1 w-full h-full justify-end">
                            <div class="chart-bar bg-primary/20 w-full rounded-t-lg h-[10%] transition-all duration-700"></div>
                            <span class="text-[10px] font-bold text-slate-400">S</span>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white/90 dark:bg-background-dark/90 backdrop-blur-xl border-t border-slate-100 dark:border-slate-800 py-2 pb-6 flex items-center z-30 px-8">
            <div class="flex justify-between items-center w-full">
                <a id="menu-dashboard" class="flex flex-col items-center gap-1 text-primary cursor-pointer" href="/dashboard">
                    <span class="material-symbols-outlined text-2xl">grid_view</span>
                    <span class="text-[10px] font-bold">Dashboard</span>
                </a>
                <a id="menu-habits" class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors cursor-pointer" href="/habits">
                    <span class="material-symbols-outlined text-2xl">format_list_bulleted</span>
                    <span class="text-[10px] font-bold">Habits</span>
                </a>
                <a id="menu-history" class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors cursor-pointer" href="/history">
                    <span class="material-symbols-outlined text-2xl">history</span>
                    <span class="text-[10px] font-bold">History</span>
                </a>
                <a id="menu-settings" class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors cursor-pointer" href="/settings">
                    <span class="material-symbols-outlined text-2xl">settings</span>
                    <span class="text-[10px] font-bold">Settings</span>
                </a>
            </div>
        </nav>
    </div>

    <script type="module" src="/js/dashboard.js"></script>
</body>
</html>
