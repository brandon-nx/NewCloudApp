<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>LifeTrack - Sleep Log</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="/css/style.css" />

  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#137fec",
            "background-light": "#f6f7f8",
            "background-dark": "#101922",
          },
          fontFamily: {
            display: ["Manrope", "sans-serif"],
          },
          borderRadius: {
            DEFAULT: "0.25rem",
            lg: "0.5rem",
            xl: "0.75rem",
            full: "9999px",
          },
        },
      },
    };
  </script>

  <style>
    body {
      min-height: max(884px, 100dvh);
      font-family: "Manrope", sans-serif;
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .quality-btn.active {
      background: white;
      color: #111827;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
    }

    .dark .quality-btn.active {
      background: rgb(51 65 85);
      color: white;
    }
  </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center">
  <div class="relative flex h-full min-h-screen w-full max-w-md flex-col bg-white dark:bg-slate-900 overflow-x-hidden shadow-2xl">
    <!-- Top Header -->
    <header class="flex-none bg-white/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
      <div class="flex items-center justify-between px-6 py-4">
        <div class="flex items-center gap-2">
          <div class="bg-primary p-1.5 rounded-lg">
            <span class="material-symbols-outlined text-white text-xl">insights</span>
          </div>
          <h1 class="text-2xl font-black tracking-tighter text-slate-900 dark:text-slate-100">LifeTrack</h1>
        </div>
        <button id="profile-btn" class="relative p-2 text-slate-600 dark:text-slate-400 active:scale-90 transition-transform">
          <span class="material-symbols-outlined text-2xl">account_circle</span>
        </button>
      </div>
    </header>

    <!-- Top Tab Bar -->
    <nav class="bg-white dark:bg-background-dark w-full">
      <div class="flex justify-around border-b border-slate-100 dark:border-slate-800 overflow-x-auto no-scrollbar">
        <a id="tab-habits" class="flex min-w-[72px] flex-1 flex-col items-center justify-center border-b-2 border-transparent text-slate-500 dark:text-slate-400 py-3 transition-all hover:text-primary" href="#">
          <span class="material-symbols-outlined mb-1">grid_view</span>
          <p class="text-[11px] font-bold">All</p>
        </a>

        <a id="tab-sleep" class="flex min-w-[72px] flex-1 flex-col items-center justify-center border-b-2 py-3 transition-all" style="border-color: #9333ea; color: #9333ea;" href="#">
          <span class="material-symbols-outlined mb-1">bedtime</span>
          <p class="text-[11px] font-bold">Sleep</p>
        </a>

        <a id="tab-exercise" class="flex min-w-[72px] flex-1 flex-col items-center justify-center border-b-2 border-transparent text-slate-500 dark:text-slate-400 py-3 transition-all hover:text-primary" href="#">
          <span class="material-symbols-outlined mb-1">fitness_center</span>
          <p class="text-[11px] font-bold">Exercise</p>
        </a>

        <a id="tab-study" class="flex min-w-[72px] flex-1 flex-col items-center justify-center border-b-2 border-transparent text-slate-500 dark:text-slate-400 py-3 transition-all hover:text-primary" href="#">
          <span class="material-symbols-outlined mb-1">menu_book</span>
          <p class="text-[11px] font-bold">Study</p>
        </a>

        <a id="tab-water" class="flex min-w-[72px] flex-1 flex-col items-center justify-center border-b-2 border-transparent text-slate-500 dark:text-slate-400 py-3 transition-all hover:text-primary" href="#">
          <span class="material-symbols-outlined mb-1">water_drop</span>
          <p class="text-[11px] font-bold">Water</p>
        </a>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 px-4 pt-6 pb-24 overflow-y-auto">
      <div class="mb-6 text-center">
        <h3 class="text-slate-900 dark:text-slate-100 text-2xl font-bold leading-tight">Sleep Tracker</h3>
        <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Consistency is key to a healthy lifestyle</p>
      </div>

      <!-- Duration Card -->
      <div class="bg-[#9333ea]/10 dark:bg-primary/10 rounded-xl p-6 mb-6 border border-primary/10">
        <div class="flex items-center justify-center mb-4">
          <div class="size-16 dark:bg-primary/30 rounded-full flex items-center justify-center">
            <span class="material-symbols-outlined text-[#9333ea] text-[48px]">bedtime</span>
          </div>
        </div>
        <div class="text-center">
          <p class="text-slate-500 dark:text-slate-400 text-xs font-semibold uppercase tracking-wider mb-1">
            Calculated Duration
          </p>
          <p id="calculated-duration" class="text-slate-900 dark:text-slate-100 text-3xl font-extrabold">0h 00m</p>
        </div>
      </div>

      <!-- Form -->
      <form id="sleep-log-form" class="space-y-6">
        <!-- Bedtime -->
        <div class="flex flex-col gap-2">
          <label class="text-slate-700 dark:text-slate-300 text-sm font-bold">Bedtime</label>
          <div class="grid grid-cols-3 gap-2">
            <select id="bedtime-hour" class="h-14 bg-slate-50 dark:bg-slate-800 border-none rounded-xl px-3 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary" required>
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
              <option value="6">6</option>
              <option value="7">7</option>
              <option value="8">8</option>
              <option value="9">9</option>
              <option value="10">10</option>
              <option value="11">11</option>
              <option value="12" selected>12</option>
            </select>

            <select id="bedtime-minute" class="h-14 bg-slate-50 dark:bg-slate-800 border-none rounded-xl px-3 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary" required>
              <option value="00">00</option>
              <option value="01">01</option>
              <option value="02">02</option>
              <option value="03">03</option>
              <option value="04">04</option>
              <option value="05">05</option>
              <option value="06">06</option>
              <option value="07">07</option>
              <option value="08">08</option>
              <option value="09">09</option>
              <option value="10">10</option>
              <option value="11">11</option>
              <option value="12" selected>12</option>
              <option value="13">13</option>
              <option value="14">14</option>
              <option value="15">15</option>
              <option value="16">16</option>
              <option value="17">17</option>
              <option value="18">18</option>
              <option value="19">19</option>
              <option value="20">20</option>
              <option value="21">21</option>
              <option value="22">22</option>
              <option value="23">23</option>
              <option value="24">24</option>
              <option value="25">25</option>
              <option value="26">26</option>
              <option value="27">27</option>
              <option value="28">28</option>
              <option value="29">29</option>
              <option value="30">30</option>
              <option value="31">31</option>
              <option value="32">32</option>
              <option value="33">33</option>
              <option value="34">34</option>
              <option value="35">35</option>
              <option value="36">36</option>
              <option value="37">37</option>
              <option value="38">38</option>
              <option value="39">39</option>
              <option value="40">40</option>
              <option value="41">41</option>
              <option value="42">42</option>
              <option value="43">43</option>
              <option value="44">44</option>
              <option value="45">45</option>
              <option value="46">46</option>
              <option value="47">47</option>
              <option value="48">48</option>
              <option value="49">49</option>
              <option value="50">50</option>
              <option value="51">51</option>
              <option value="52">52</option>
              <option value="53">53</option>
              <option value="54">54</option>
              <option value="55">55</option>
              <option value="56">56</option>
              <option value="57">57</option>
              <option value="58">58</option>
              <option value="59">59</option>
            </select>

            <select id="bedtime-period" class="h-14 bg-slate-50 dark:bg-slate-800 border-none rounded-xl px-3 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary" required>
              <option value="AM">AM</option>
              <option value="PM" selected>PM</option>
            </select>
          </div>
        </div>

        <!-- Wake Time -->
        <div class="flex flex-col gap-2">
          <label class="text-slate-700 dark:text-slate-300 text-sm font-bold">Wake Up Time</label>
          <div class="grid grid-cols-3 gap-2">
            <select id="wake-hour" class="h-14 bg-slate-50 dark:bg-slate-800 border-none rounded-xl px-3 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary" required>
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
              <option value="6">6</option>
              <option value="7" selected>7</option>
              <option value="8">8</option>
              <option value="9">9</option>
              <option value="10">10</option>
              <option value="11">11</option>
              <option value="12">12</option>
            </select>

            <select id="wake-minute" class="h-14 bg-slate-50 dark:bg-slate-800 border-none rounded-xl px-3 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary" required>
              <option value="00">00</option>
              <option value="01">01</option>
              <option value="02">02</option>
              <option value="03">03</option>
              <option value="04">04</option>
              <option value="05">05</option>
              <option value="06">06</option>
              <option value="07">07</option>
              <option value="08">08</option>
              <option value="09">09</option>
              <option value="10">10</option>
              <option value="11">11</option>
              <option value="12">12</option>
              <option value="13">13</option>
              <option value="14">14</option>
              <option value="15" selected>15</option>
              <option value="16">16</option>
              <option value="17">17</option>
              <option value="18">18</option>
              <option value="19">19</option>
              <option value="20">20</option>
              <option value="21">21</option>
              <option value="22">22</option>
              <option value="23">23</option>
              <option value="24">24</option>
              <option value="25">25</option>
              <option value="26">26</option>
              <option value="27">27</option>
              <option value="28">28</option>
              <option value="29">29</option>
              <option value="30">30</option>
              <option value="31">31</option>
              <option value="32">32</option>
              <option value="33">33</option>
              <option value="34">34</option>
              <option value="35">35</option>
              <option value="36">36</option>
              <option value="37">37</option>
              <option value="38">38</option>
              <option value="39">39</option>
              <option value="40">40</option>
              <option value="41">41</option>
              <option value="42">42</option>
              <option value="43">43</option>
              <option value="44">44</option>
              <option value="45">45</option>
              <option value="46">46</option>
              <option value="47">47</option>
              <option value="48">48</option>
              <option value="49">49</option>
              <option value="50">50</option>
              <option value="51">51</option>
              <option value="52">52</option>
              <option value="53">53</option>
              <option value="54">54</option>
              <option value="55">55</option>
              <option value="56">56</option>
              <option value="57">57</option>
              <option value="58">58</option>
              <option value="59">59</option>
            </select>

            <select id="wake-period" class="h-14 bg-slate-50 dark:bg-slate-800 border-none rounded-xl px-3 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary" required>
              <option value="AM" selected>AM</option>
              <option value="PM">PM</option>
            </select>
          </div>
        </div>

        <!-- Sleep Quality -->
        <div class="flex flex-col gap-2">
          <label class="text-slate-700 dark:text-slate-300 text-sm font-bold">Sleep Quality</label>
          <div class="flex justify-between items-center bg-slate-50 dark:bg-slate-800 p-2 rounded-xl">
            <button type="button" class="quality-btn flex-1 py-2 flex justify-center text-slate-400 rounded-lg transition" data-quality="1" aria-label="Very dissatisfied">
              <span class="material-symbols-outlined">sentiment_very_dissatisfied</span>
            </button>
            <button type="button" class="quality-btn flex-1 py-2 flex justify-center text-slate-400 rounded-lg transition" data-quality="2" aria-label="Dissatisfied">
              <span class="material-symbols-outlined">sentiment_dissatisfied</span>
            </button>
            <button type="button" class="quality-btn active flex-1 py-2 flex justify-center rounded-lg transition" data-quality="3" aria-label="Satisfied">
              <span class="material-symbols-outlined">sentiment_satisfied</span>
            </button>
            <button type="button" class="quality-btn flex-1 py-2 flex justify-center text-slate-400 rounded-lg transition" data-quality="4" aria-label="Very satisfied">
              <span class="material-symbols-outlined">sentiment_very_satisfied</span>
            </button>
          </div>
          <input id="sleep-quality-input" name="sleepQuality" type="hidden" value="3" />
        </div>

        <div id="sleep-log-message" class="hidden text-sm font-medium rounded-lg px-4 py-3"></div>

        <button
          id="save-sleep-btn"
          type="submit"
          class="w-full h-14 bg-purple-600 hover:bg-purple-700 text-white font-bold rounded-xl transition-colors shadow-lg shadow-purple-500/20 flex items-center justify-center gap-2 mt-4"
        >
          <span class="material-symbols-outlined">save</span>
          <span id="save-sleep-btn-text">Log Sleep</span>
        </button>
      </form>
    </main>

    <!-- Bottom Menu -->
    <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white/90 dark:bg-background-dark/90 backdrop-blur-xl border-t border-slate-100 dark:border-slate-800 py-2 pb-6 flex items-center z-30 px-8">
      <div class="flex justify-between items-center w-full">
        <a id="menu-dashboard" class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
          <span class="material-symbols-outlined text-2xl">grid_view</span>
          <span class="text-[10px] font-bold">Dashboard</span>
        </a>
        <a id="menu-habits" class="flex flex-col items-center gap-1 text-primary" href="#">
          <span class="material-symbols-outlined text-2xl fill-1">format_list_bulleted</span>
          <span class="text-[10px] font-bold">Habits</span>
        </a>
        <a id="menu-history" class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
          <span class="material-symbols-outlined text-2xl">history</span>
          <span class="text-[10px] font-bold">History</span>
        </a>
        <a id="menu-settings" class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
          <span class="material-symbols-outlined text-2xl">settings</span>
          <span class="text-[10px] font-bold">Settings</span>
        </a>
      </div>
    </nav>
  </div>

  <script type="module" src="/js/sleepLog.js"></script>
</body>
</html>
