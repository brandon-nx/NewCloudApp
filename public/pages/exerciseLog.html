<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>LifeTrack - Exercise Log</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
  />  
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="/css/style.css" />

  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#137fec",
            "background-light": "#f6f7f8",
            "background-dark": "#101922",
          },
          fontFamily: {
            display: ["Manrope", "sans-serif"],
          },
          borderRadius: {
            DEFAULT: "0.25rem",
            lg: "0.5rem",
            xl: "0.75rem",
            full: "9999px",
          },
        },
      },
    };
  </script>

  <style>
    .material-symbols-outlined {
      font-family: "Material Symbols Outlined";
      font-weight: normal;
      font-style: normal;
      font-size: 24px;
      line-height: 1;
      letter-spacing: normal;
      text-transform: none;
      display: inline-block;
      white-space: nowrap;
      word-wrap: normal;
      direction: ltr;
      -webkit-font-smoothing: antialiased;
      font-variation-settings:
        "FILL" 0,
        "wght" 400,
        "GRAD" 0,
        "opsz" 24;
    }

    body {
      min-height: max(884px, 100dvh);
      font-family: "Manrope", sans-serif;
    }

    .material-symbols-outlined {
      font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    select {
      appearance: none;
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2364748b' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
      background-position: right 0.75rem center;
      background-repeat: no-repeat;
      background-size: 1.25rem 1.25rem;
      padding-right: 2.5rem;
    }
  </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased overflow-hidden">
  <div class="app-container flex flex-col overflow-x-hidden">
    <div class="relative flex h-screen w-full max-w-md mx-auto flex-col bg-white dark:bg-background-dark shadow-xl overflow-hidden">
      <!-- Top Header -->
      <header class="flex-none bg-white/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
        <div class="flex items-center justify-between px-6 py-4">
          <div class="flex items-center gap-2">
            <div class="bg-primary p-1.5 rounded-lg">
              <span class="material-symbols-outlined text-white text-xl">insights</span>
            </div>
            <h1 class="text-2xl font-black tracking-tighter text-slate-900 dark:text-slate-100">LifeTrack</h1>
          </div>
          <button id="profile-btn" class="relative p-2 text-slate-600 dark:text-slate-400 active:scale-90 transition-transform">
            <span class="material-symbols-outlined text-2xl">account_circle</span>
          </button>
        </div>
      </header>

      <!-- Top Tab Bar -->
      <nav class="bg-white dark:bg-background-dark w-full">
        <div class="flex justify-around border-b border-slate-100 dark:border-slate-800 overflow-x-auto no-scrollbar">
          <a id="tab-habits" class="flex min-w-[72px] flex-1 flex-col items-center justify-center border-b-2 border-transparent text-slate-500 dark:text-slate-400 py-3 transition-all hover:text-primary" href="#">
            <span class="material-symbols-outlined mb-1">grid_view</span>
            <p class="text-[11px] font-bold">All</p>
          </a>

          <a id="tab-sleep" class="flex min-w-[72px] flex-1 flex-col items-center justify-center border-b-2 border-transparent text-slate-500 dark:text-slate-400 py-3 transition-all hover:text-primary" href="#">
            <span class="material-symbols-outlined mb-1">bedtime</span>
            <p class="text-[11px] font-bold">Sleep</p>
          </a>

          <a id="tab-exercise" class="flex min-w-[72px] flex-1 flex-col items-center justify-center border-b-2 py-3 transition-all" style="border-color: #10b981; color: #10b981;" href="#">
            <span class="material-symbols-outlined mb-1">fitness_center</span>
            <p class="text-[11px] font-bold">Exercise</p>
          </a>

          <a id="tab-study" class="flex min-w-[72px] flex-1 flex-col items-center justify-center border-b-2 border-transparent text-slate-500 dark:text-slate-400 py-3 transition-all hover:text-primary" href="#">
            <span class="material-symbols-outlined mb-1">menu_book</span>
            <p class="text-[11px] font-bold">Study</p>
          </a>

          <a id="tab-water" class="flex min-w-[72px] flex-1 flex-col items-center justify-center border-b-2 border-transparent text-slate-500 dark:text-slate-400 py-3 transition-all hover:text-primary" href="#">
            <span class="material-symbols-outlined mb-1">water_drop</span>
            <p class="text-[11px] font-bold">Water</p>
          </a>
        </div>
      </nav>

      <!-- Main Content -->
      <section class="flex-1 overflow-y-auto px-5 py-6 pb-28 space-y-6 no-scrollbar">
        <div class="flex items-center justify-between">
          <div>
            <h1 class="text-2xl font-extrabold text-slate-900 dark:text-slate-100">Log Exercise</h1>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Record your physical activity</p>
          </div>
          <div class="bg-primary/10 p-3 rounded-full" style="background-color: rgba(16, 185, 129, 0.1);">
            <span class="material-symbols-outlined text-primary text-3xl" style="color: #10b981;">fitness_center</span>
          </div>
        </div>

        <form id="exercise-log-form" class="space-y-6">
          <!-- Activity Type -->
          <div class="space-y-2">
            <label for="exercise-activity-input" class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">
              Activity Type
            </label>
            <select
              id="exercise-activity-input"
              class="w-full bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-4 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all font-medium"
              required
            >
              <option value="Running">Running</option>
              <option value="Walking">Walking</option>
              <option value="Cycling">Cycling</option>
              <option value="Swimming">Swimming</option>
              <option value="Weightlifting">Weightlifting</option>
              <option value="Yoga">Yoga</option>
              <option value="HIIT">HIIT</option>
              <option value="Stretching">Stretching</option>
              <option value="Football">Football</option>
              <option value="Badminton">Badminton</option>
              <option value="Basketball">Basketball</option>
              <option value="Gym Workout">Gym Workout</option>
            </select>
          </div>

          <!-- Start Time -->
          <div class="space-y-2">
            <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Start Time</label>
            <div class="grid grid-cols-3 gap-2">
              <select id="exercise-start-hour" class="h-14 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl px-3 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary" required>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7" selected>7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>
                <option value="11">11</option>
                <option value="12">12</option>
              </select>

              <select id="exercise-start-minute" class="h-14 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl px-3 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary" required>
                <option value="00" selected>00</option>
                <option value="05">05</option>
                <option value="10">10</option>
                <option value="15">15</option>
                <option value="20">20</option>
                <option value="25">25</option>
                <option value="30">30</option>
                <option value="35">35</option>
                <option value="40">40</option>
                <option value="45">45</option>
                <option value="50">50</option>
                <option value="55">55</option>
              </select>

              <select id="exercise-start-period" class="h-14 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl px-3 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary" required>
                <option value="AM" selected>AM</option>
                <option value="PM">PM</option>
              </select>
            </div>
          </div>

          <!-- End Time -->
          <div class="space-y-2">
            <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">End Time</label>
            <div class="grid grid-cols-3 gap-2">
              <select id="exercise-end-hour" class="h-14 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl px-3 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary" required>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7" selected>7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>
                <option value="11">11</option>
                <option value="12">12</option>
              </select>

              <select id="exercise-end-minute" class="h-14 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl px-3 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary" required>
                <option value="00">00</option>
                <option value="05">05</option>
                <option value="10">10</option>
                <option value="15">15</option>
                <option value="20">20</option>
                <option value="25">25</option>
                <option value="30">30</option>
                <option value="35">35</option>
                <option value="40">40</option>
                <option value="45" selected>45</option>
                <option value="50">50</option>
                <option value="55">55</option>
              </select>

              <select id="exercise-end-period" class="h-14 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl px-3 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary" required>
                <option value="AM" selected>AM</option>
                <option value="PM">PM</option>
              </select>
            </div>
          </div>

          <!-- Duration -->
          <div class="bg-primary/5 dark:bg-primary/10 border border-primary/20 rounded-xl p-5 flex items-center justify-between" style="background-color: rgba(16, 185, 129, 0.05); border-color: rgba(16, 185, 129, 0.2);">
            <div>
              <p class="text-slate-500 dark:text-slate-400 text-xs font-bold uppercase tracking-wider">Total Duration</p>
              <p id="exercise-duration-display" class="text-2xl font-black text-primary mt-1" style="color: #10b981;">45 Minutes</p>
            </div>
            <span class="material-symbols-outlined text-primary text-4xl opacity-50" style="color: #10b981;">timer</span>
          </div>

          <!-- Remarks -->
          <div class="space-y-2">
            <label for="exercise-remarks-input" class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Remarks</label>
            <textarea
              id="exercise-remarks-input"
              class="w-full bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all font-medium resize-none"
              placeholder="Add any notes about your session..."
              rows="3"
            ></textarea>
          </div>

          <div id="exercise-log-message" class="hidden text-sm font-medium rounded-lg px-4 py-3"></div>

          <div class="pt-4">
            <button
              id="save-exercise-btn"
              type="submit"
              class="w-full bg-[#10b981] hover:bg-[#059669] text-white font-bold py-4 rounded-xl shadow-lg shadow-[#10b981]/30 transition-all flex items-center justify-center gap-2 active:scale-[0.98]"
            >
              <span class="material-symbols-outlined">add_circle</span>
              <span id="save-exercise-btn-text">Log Exercise</span>
            </button>
          </div>
        </form>
      </section>

      <!-- Bottom Menu -->
      <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white/90 dark:bg-background-dark/90 backdrop-blur-xl border-t border-slate-100 dark:border-slate-800 py-2 pb-6 flex items-center z-30 px-8">
        <div class="flex justify-between items-center w-full">
          <a id="menu-dashboard" class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
            <span class="material-symbols-outlined text-2xl">grid_view</span>
            <span class="text-[10px] font-bold">Dashboard</span>
          </a>
          <a id="menu-habits" class="flex flex-col items-center gap-1 text-primary" href="#">
            <span class="material-symbols-outlined text-2xl fill-1">format_list_bulleted</span>
            <span class="text-[10px] font-bold">Habits</span>
          </a>
          <a id="menu-history" class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
            <span class="material-symbols-outlined text-2xl">history</span>
            <span class="text-[10px] font-bold">History</span>
          </a>
          <a id="menu-settings" class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
            <span class="material-symbols-outlined text-2xl">settings</span>
            <span class="text-[10px] font-bold">Settings</span>
          </a>
        </div>
      </nav>
    </div>
  </div>

  <script type="module" src="/js/exerciseLog.js"></script>
</body>
</html>
