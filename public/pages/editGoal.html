<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/css/style.css">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
        <title>LifeTrack - Edit Goals</title>
    <body class="font-display">
    <div class="app-container flex flex-col overflow-x-hidden">
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden max-w-md mx-auto bg-white dark:bg-background-dark">
<!-- Header -->
<header class="sticky top-0 z-10 flex items-center bg-white/80 dark:bg-background-dark/80 backdrop-blur-md p-4 justify-between border-b border-slate-200 dark:border-slate-800">
    <button id="back-btn" class="flex size-10 items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
        <span class="material-symbols-outlined text-slate-700 dark:text-slate-300">arrow_back</span>
    </button>
    
    <h1 class="text-slate-900 dark:text-slate-100 text-lg font-bold tracking-tight">Edit Goals</h1>
    
    <button id="save-goals-btn" class="flex size-10 items-center justify-center rounded-full bg-primary/10 text-primary hover:bg-primary/20 transition-colors">
        <span class="material-symbols-outlined font-bold">check</span>
    </button>
</header>
<main class="flex-1 overflow-y-auto no-scrollbar pb-8">
<!-- Hero Title Section -->
<div class="px-6 py-6">
<h2 class="text-2xl font-extrabold text-slate-900 dark:text-slate-100">Daily Habits</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Adjust your targets for a healthier lifestyle.</p>
</div>
<!-- Goal Cards Container -->
<div class="px-4 flex flex-col gap-4">
<!-- Sleep Goal Card -->
<div class="bg-white dark:bg-slate-900 p-5 rounded-xl shadow-sm border border-slate-100 dark:border-slate-800 flex items-center justify-between group">
    <div class="flex items-center gap-4">
        <div class="flex size-12 items-center justify-center rounded-xl bg-[#9333ea]/10 dark:bg-[#9333ea]/20 text-[#9333ea]">
            <span class="material-symbols-outlined text-[28px]">bedtime</span>
        </div>
        <div class="flex flex-col">
            <span class="text-slate-900 dark:text-slate-100 font-bold text-base leading-tight">Sleep</span>
            <span class="text-slate-500 dark:text-slate-400 text-xs font-medium uppercase tracking-wider mt-1">Hours / Night</span>
        </div>
    </div>
    
    <div class="flex items-center gap-3">
        <button class="size-9 flex items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 active:scale-90 transition-transform">
            <span class="material-symbols-outlined text-xl">remove</span>
        </button>
        
        <span class="text-xl font-bold w-8 text-center text-primary">8</span>
        <button class="size-9 flex items-center justify-center rounded-full bg-primary text-white active:scale-90 transition-transform shadow-lg shadow-primary/20">
            <span class="material-symbols-outlined text-xl">add</span>
        </button>
    </div>
</div>
<!-- Exercise Goal Card -->
<div class="bg-white dark:bg-slate-900 p-5 rounded-xl shadow-sm border border-slate-100 dark:border-slate-800 flex items-center justify-between group">
<div class="flex items-center gap-4">
<div class="flex size-12 items-center justify-center rounded-xl bg-orange-50 dark:bg-orange-900/30 text-orange-600 dark:text-orange-400">
<span class="material-symbols-outlined text-[28px]">fitness_center</span>
</div>
<div class="flex flex-col">
<span class="text-slate-900 dark:text-slate-100 font-bold text-base leading-tight">Exercise</span>
<span class="text-slate-500 dark:text-slate-400 text-xs font-medium uppercase tracking-wider mt-1">Minutes / Day</span>
</div>
</div>
<div class="flex items-center gap-3">
<button class="size-9 flex items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 active:scale-90 transition-transform">
<span class="material-symbols-outlined text-xl">remove</span>
</button>
<span class="text-xl font-bold w-8 text-center text-primary">45</span>
<button class="size-9 flex items-center justify-center rounded-full bg-primary text-white active:scale-90 transition-transform shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-xl">add</span>
</button>
</div>
</div>
<!-- Study Goal Card -->
<div class="bg-white dark:bg-slate-900 p-5 rounded-xl shadow-sm border border-slate-100 dark:border-slate-800 flex items-center justify-between group">
<div class="flex items-center gap-4">
<div class="flex size-12 items-center justify-center rounded-xl bg-emerald-50 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400">
<span class="material-symbols-outlined text-[28px]">menu_book</span>
</div>
<div class="flex flex-col">
<span class="text-slate-900 dark:text-slate-100 font-bold text-base leading-tight">Study</span>
<span class="text-slate-500 dark:text-slate-400 text-xs font-medium uppercase tracking-wider mt-1">Hours / Day</span>
</div>
</div>
<div class="flex items-center gap-3">
<button class="size-9 flex items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 active:scale-90 transition-transform">
<span class="material-symbols-outlined text-xl">remove</span>
</button>
<span class="text-xl font-bold w-8 text-center text-primary">2.5</span>
<button class="size-9 flex items-center justify-center rounded-full bg-primary text-white active:scale-90 transition-transform shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-xl">add</span>
</button>
</div>
</div>
<!-- Water Goal Card -->
<div class="bg-white dark:bg-slate-900 p-5 rounded-xl shadow-sm border border-slate-100 dark:border-slate-800 flex items-center justify-between group">
<div class="flex items-center gap-4">
<div class="flex size-12 items-center justify-center rounded-xl bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400">
<span class="material-symbols-outlined text-[28px]">water_drop</span>
</div>
<div class="flex flex-col">
<span class="text-slate-900 dark:text-slate-100 font-bold text-base leading-tight">Water</span>
<span class="text-slate-500 dark:text-slate-400 text-xs font-medium uppercase tracking-wider mt-1">ML / DAY</span>
</div>
</div>
<div class="flex items-center gap-3">
<button class="size-9 flex items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 active:scale-90 transition-transform">
<span class="material-symbols-outlined text-xl">remove</span>
</button>
<span class="text-xl font-bold text-center text-primary min-w-[60px]">2500</span>
<button class="size-9 flex items-center justify-center rounded-full bg-primary text-white active:scale-90 transition-transform shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-xl">add</span>
</button>
</div>
</div>
<!-- Tip Card -->
</div>
</main>
<!-- Bottom Navigation Bar -->
</div>
<script src="/js/editGoal.js"></script>
</body></html>
